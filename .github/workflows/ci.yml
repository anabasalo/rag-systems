name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid spending CI minutes on superseded commits in the same PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check app tests

      - name: Ruff (format)
        run: ruff format --check app tests

      - name: Pytest
        # The suite uses fakes for Groq and RAGAS, so no API key is needed in CI.
        run: pytest -v --maxfail=1
